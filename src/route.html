<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Mason Navigator — Route</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f7fa;
        --card: #ffffff;
        --accent: #0057b8;
        --accent2: #003d82;
        --green: #16a34a;
        --red: #dc2626;
        --orange: #ea580c;
        --text: #111827;
        --dim: #6b7280;
        --border: #e5e7eb;
        --font: "Inter", system-ui, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100vh;
        padding-bottom: 32px;
      }

      /* ── Header ── */
      .header {
        background: linear-gradient(
          135deg,
          #003d82 0%,
          #0057b8 60%,
          #1a7fd4 100%
        );
        padding: 20px 20px 28px;
        position: relative;
        overflow: hidden;
      }
      .header::after {
        content: "";
        position: absolute;
        bottom: -12px;
        left: 0;
        right: 0;
        height: 24px;
        background: var(--bg);
        border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      }
      .header-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
      }
      .header-logo {
        font-size: 1.8rem;
      }
      .header-text {
      }
      .header-title {
        font-size: 1.1rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .header-sub {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.72);
        margin-top: 2px;
        font-weight: 500;
      }

      /* ── Expiry bar ── */
      .expiry-bar {
        margin: 20px 16px 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .expiry-icon {
        font-size: 1.1rem;
        flex-shrink: 0;
      }
      .expiry-text {
        flex: 1;
      }
      .expiry-label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text);
      }
      .expiry-sub {
        font-size: 0.68rem;
        color: var(--dim);
        margin-top: 2px;
      }
      .expiry-pill {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        background: #dcfce7;
        color: #16a34a;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .expiry-pill.warn {
        background: #fef3c7;
        color: #d97706;
      }
      .expiry-pill.dead {
        background: #fee2e2;
        color: #dc2626;
      }

      /* ── Route header ── */
      .route-card {
        margin: 12px 16px 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .route-title {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dim);
        margin-bottom: 10px;
      }
      .route-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .route-room {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text);
      }
      .route-arrow {
        font-size: 1rem;
        color: var(--accent);
        font-weight: 700;
      }
      .route-badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .badge {
        font-size: 0.65rem;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1px solid;
      }
      .badge-floor {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 87, 184, 0.07);
      }
      .badge-stairs {
        border-color: #7c3aed;
        color: #7c3aed;
        background: rgba(124, 58, 237, 0.07);
      }

      /* ── Map ── */
      .map-section {
        margin: 12px 16px 0;
      }
      .map-label {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dim);
        margin-bottom: 8px;
        padding-left: 2px;
      }
      .map-floor-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .map-floor-label {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--accent);
        padding: 10px 14px 0;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .map-wrap {
        position: relative;
        width: 100%;
        line-height: 0;
        padding: 8px;
      }
      .map-wrap img {
        width: 100%;
        height: auto;
        border-radius: 6px;
        display: block;
      }
      .map-wrap canvas {
        position: absolute;
        top: 8px;
        left: 8px;
        width: calc(100% - 16px);
        height: calc(100% - 16px);
        border-radius: 6px;
        pointer-events: none;
      }

      /* ── Directions ── */
      .dir-section {
        margin: 12px 16px 0;
      }
      .dir-steps {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .dir-step {
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--border);
        border-radius: 0 10px 10px 0;
        padding: 12px 14px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        animation: stepIn 0.3s ease both;
      }
      .dir-step:first-child {
        border-left-color: var(--accent);
      }
      .dir-step:last-child {
        border-left-color: var(--green);
      }
      @keyframes stepIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .step-ico {
        font-size: 1.1rem;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .step-main {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
      }
      .step-main strong {
        color: var(--accent);
      }
      .step-sub {
        font-size: 0.68rem;
        color: var(--dim);
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .step-warn {
        font-size: 0.72rem;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fcd34d;
        border-radius: 6px;
        padding: 5px 8px;
        margin-top: 6px;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin: 0 16px;
        padding: 12px 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.68rem;
        color: var(--dim);
      }
      .ldot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── Expired / error screens ── */
      .full-screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px 24px;
      }
      .expired-icon {
        font-size: 4rem;
        margin-bottom: 20px;
      }
      .expired-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 8px;
      }
      .expired-sub {
        font-size: 0.9rem;
        color: var(--dim);
        max-width: 280px;
        line-height: 1.6;
      }
      .expired-time {
        margin-top: 20px;
        font-size: 0.78rem;
        font-weight: 600;
        padding: 8px 18px;
        border-radius: 20px;
        background: #fee2e2;
        color: #dc2626;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.65rem;
        color: var(--dim);
        padding: 0 16px;
      }
    </style>
  </head>

        if (pod.endsWith("_2")) return 2;
        return 1;

        if (ALL_ROOMS[node]) return getRoomFloor(node);
        if (STAIR_NODES.has(node)) return null;
        if (node === "Lobby_1") return 1;
        if (node === "Lobby_2") return 2;
        if (node.endsWith("_3")) return 3;
        if (node.endsWith("_2")) return 2;
        return 1;
      }

      function bfs(start, end) {
        if (start === end) return [start];
        const queue = [[start]],
          visited = new Set([start]);
        while (queue.length) {
          const path = queue.shift(),
            node = path[path.length - 1];
          for (const nb of G[node] || []) {
            if (nb === end) return [...path, nb];
            if (!visited.has(nb)) {
              visited.add(nb);
              queue.push([...path, nb]);
            }
          }
        }
        return null;

        const endNode = path[path.length - 1];
        const ep =
          toPx(endNode) || (pts.length > 0 ? pts[pts.length - 1].p : null);
        if (ep && getNodeFloor(endNode) === floor) {
          dot(ctx, ep.x, ep.y, 7, "#dc2626", "#fff");
          label(ctx, ep.x, ep.y - 12, endNode);
        } else if (pts.length > 0) {
          // Stair exit on this floor
          const last = pts[pts.length - 1];
          if (STAIR_NODES.has(last.node)) {
            dot(ctx, last.p.x, last.p.y, 7, "#ea580c", "#fff");
            label(ctx, last.p.x, last.p.y - 12, "Take Stairs ▲");
          }
        }
      }

      function dot(ctx, x, y, r, fill, stroke) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      function label(ctx, x, y, text) {
        ctx.font = "bold 9px Inter,sans-serif";
        ctx.textAlign = "center";
        const m = ctx.measureText(text);
        const w = m.width + 8,
          h = 14;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.beginPath();
        ctx.roundRect(x - w / 2, y - h + 2, w, h, 3);
        ctx.fill();
        ctx.fillStyle = "#111827";
        ctx.fillText(text, x, y - 1);
      }

      // ── Expiry countdown ──────────────────────────────────────────
      function formatTimeLeft(ms) {
        if (ms <= 0) return "Expired";
        const m = Math.floor(ms / 60000),
          s = Math.floor((ms % 60000) / 1000);
        return `${m}:${s.toString().padStart(2, "0")} left`;
      }

      function updateExpiry(issued, pillEl, labelEl) {
        const elapsed = Date.now() - issued;
        const left = EXPIRY_MS - elapsed;
        const pct = Math.max(0, left / EXPIRY_MS);
        pillEl.textContent = formatTimeLeft(left);
        if (pct > 0.4) {
          pillEl.className = "expiry-pill";
        } else if (pct > 0.15) {
          pillEl.className = "expiry-pill warn";
        } else {
          pillEl.className = "expiry-pill dead";
        }
        if (left <= 0) {
          document.getElementById("root").innerHTML = expiredHTML(
            new Date(issued),
          );
          return false;
        }
        return true;
      }

      function expiredHTML(issuedDate) {
        return `<div class="full-screen">
    <div class="expired-icon">⏱️</div>
    <div class="expired-title">Route Expired</div>
    <div class="expired-sub">This route link is no longer valid. Please return to the kiosk to generate a new one.</div>
    <div class="expired-time">Issued at ${issuedDate.toLocaleTimeString()}</div>
  </div>`;
      }

      // ── Direction builder ─────────────────────────────────────────
      function buildSteps(path, start, end) {
        const sf = getRoomFloor(start) || 1;
        const ef = getRoomFloor(end) || 1;
        const steps = [];
        let prevFloor = sf;
        const STAIR_DESC = {
          C_Stair: "C Stairwell (C Pod)",
          B_Stair: "B Stairwell (B/C junction)",
          A_Stair: "A Stairwell (A/B connector)",
          Z_Stair: "Z Stairwell (A/Z junction)",
          Z2: "Z2 connector stair",
          A2: "A2 connector stair",
          B2: "B2 connector stair",
          Front_Stair: "Front office stairwell",
        };
        const fl = (f) => (f === 1 ? "1st" : f === 2 ? "2nd" : "3rd");

        steps.push({
          icon: "📍",
          main: `<strong>${roomLabel(start)}</strong>`,
          sub: `${fl(sf)} floor`,
        });

        for (let i = 1; i < path.length; i++) {
          const node = path[i];
          if (STAIR_NODES.has(node)) {
            let toF = prevFloor;
            for (let j = i + 1; j < path.length; j++) {
              const f = getNodeFloor(path[j]);
              if (f) {
                toF = f;
                break;
              }
            }
            const dir = toF > prevFloor ? "up" : "down";
            steps.push({
              icon: dir === "up" ? "⬆️" : "⬇️",
              main: `Take the <strong>${STAIR_DESC[node] || node}</strong> ${dir} to the <strong>${fl(toF)} floor</strong>`,
              sub: "Look for stairwell signs",
            });
            prevFloor = toF;
            continue;
          }
          if (
            /^[A-Z](?:_Pod|_Wing)_\d$/.test(node) ||
            /^Commons_\d$/.test(node) ||
            node === "Lobby_1" ||
            node === "Lobby_2"
          ) {
            continue; // skip hub nodes in text
          }
          if (node === end) {
            steps.push({
              icon: "🎯",
              main: `<strong>${roomLabel(end)}</strong>`,
              sub: `${fl(ef)} floor · Destination`,
            });
          }
        }
        return steps;
      }

      // ── Main render ───────────────────────────────────────────────
      function render() {
        const params = new URLSearchParams(window.location.search);
        const start = params.get("s"),
          end = params.get("e"),
          t = parseInt(params.get("t") || "0", 10);

        if (!start || !end || !t) {
          document.getElementById("root").innerHTML = `<div class="full-screen">
      <div class="expired-icon">🗺️</div>
      <div class="expired-title">No Route</div>
      <div class="expired-sub">Scan a QR code from the Mason Navigator kiosk to view your route.</div>
    </div>`;
          return;
        }

        const issued = t * 1000;
        const elapsed = Date.now() - issued;
        if (elapsed > EXPIRY_MS) {
          document.getElementById("root").innerHTML = expiredHTML(
            new Date(issued),
          );
          return;
        }

        if (!G[start] || !G[end]) {
          document.getElementById("root").innerHTML = `<div class="full-screen">
      <div class="expired-icon">❌</div>
      <div class="expired-title">Unknown Room</div>
      <div class="expired-sub">Room "${!G[start] ? start : end}" not found in the system.</div>
    </div>`;
          return;
        }

        const path = bfs(start, end);
        if (!path) {
          document.getElementById("root").innerHTML = `<div class="full-screen">
      <div class="expired-icon">❌</div>
      <div class="expired-title">No Route Found</div>
      <div class="expired-sub">Could not find a path from ${start} to ${end}.</div>
    </div>`;
          return;
        }

        const sf = getRoomFloor(start) || 1;
        const ef = getRoomFloor(end) || 1;
        const floors = [
          ...new Set(path.map((n) => getNodeFloor(n)).filter(Boolean)),
        ].sort();
        const stairCount = path.filter(
          (n) => STAIR_NODES.has(n) && !["Z2", "A2", "B2"].includes(n),
        ).length;
        const steps = buildSteps(path, start, end);

        const flBadge =
          floors.length > 1
            ? `<span class="badge badge-floor">Floors ${floors.join("→")}</span>`
            : `<span class="badge badge-floor">Floor ${floors[0] || sf}</span>`;
        const stBadge =
          stairCount > 0
            ? `<span class="badge badge-stairs">🪜 ${stairCount} stairwell${stairCount > 1 ? "s" : ""}</span>`
            : "";

        const mapsHTML = floors
          .map(
            (f) => `
    <div class="map-floor-block">
      <div class="map-floor-label">Floor ${f}</div>
      <div class="map-wrap">
        <img id="map-img-${f}" src="${FLOOR_IMGS[f]}" alt="Floor ${f}" crossorigin="anonymous"/>
        <canvas id="map-canvas-${f}"></canvas>
      </div>
    </div>`,
          )
          .join("");

        const stepsHTML = steps
          .map(
            (s, i) => `
    <li class="dir-step" style="animation-delay:${i * 0.06}s">
      <span class="step-ico">${s.icon}</span>
      <div>
        <div class="step-main">${s.main}</div>
        <div class="step-sub">${s.sub}</div>
        ${s.warn ? `<div class="step-warn">${s.warn}</div>` : ""}
      </div>
    </li>`,
          )
          .join("");

        document.getElementById("root").innerHTML = `
    <div class="header">
      <div class="header-inner">
        <div class="header-logo">🏫</div>
        <div class="header-text">
          <div class="header-title">Mason Navigator</div>
          <div class="header-sub">Mason High School · Mason, OH 45040</div>
        </div>
      </div>
    </div>

    <div class="expiry-bar">
      <div class="expiry-icon">⏱️</div>
      <div class="expiry-text">
        <div class="expiry-label">Route expires in</div>
        <div class="expiry-sub">Issued at ${new Date(issued).toLocaleTimeString()}</div>
      </div>
      <div class="expiry-pill" id="expiryPill">${formatTimeLeft(EXPIRY_MS - elapsed)}</div>
    </div>

    <div class="route-card">
      <div class="route-title">Your Route</div>
      <div class="route-row">
        <span class="route-room">${start}</span>
        <span class="route-arrow">→</span>
        <span class="route-room">${end}</span>
      </div>
      <div class="route-badges">${flBadge}${stBadge}</div>
    </div>

    <div class="map-section">
      <div class="map-label">Floor Plan</div>
      ${mapsHTML}
    </div>

    <div class="legend">
      <div class="legend-item"><div class="ldot" style="background:#0057b8"></div>Start</div>
      <div class="legend-item"><div class="ldot" style="background:#16a34a"></div>Route</div>
      <div class="legend-item"><div class="ldot" style="background:#ea580c"></div>Stairs</div>
      <div class="legend-item"><div class="ldot" style="background:#dc2626"></div>Destination</div>
    </div>

    <div class="dir-section">
      <div class="map-label" style="margin-bottom:8px">Step-by-step</div>
      <ul class="dir-steps">${stepsHTML}</ul>
    </div>

    <div class="footer">Mason City Schools · Student Navigation Project · Sarvin Sukhe</div>
  `;

        // Draw maps after images load
        for (const f of floors) {
          const img = document.getElementById(`map-img-${f}`);
          const canvas = document.getElementById(`map-canvas-${f}`);
          const draw = () => drawRoute(canvas, img, f, path);
          if (img.complete && img.naturalWidth) draw();
          else img.onload = draw;
        }

        // Live countdown
        const pillEl = document.getElementById("expiryPill");
        const tick = setInterval(() => {
          if (!updateExpiry(issued, pillEl)) clearInterval(tick);
        }, 1000);
      }

      render();
    </script>
  </body>
</html>
